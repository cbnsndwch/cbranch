name: ci

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: License audit
        run: pnpm license-audit

      - name: Lint (oxlint)
        run: pnpm lint

      - name: Format check (oxfmt)
        run: pnpm format:check

      - name: Typecheck (tsc -b)
        run: pnpm typecheck

      - name: Build (pnpm -r build)
        run: pnpm build

      - name: Test (vitest)
        run: pnpm test

      - name: Dependency-direction check
        run: pnpm depcheck

      - name: Primitive-existence check (advisory)
        run: pnpm check:primitives
